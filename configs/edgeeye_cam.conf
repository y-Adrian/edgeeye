# edgeeye_cam.conf — EdgeEye 摄像头产品配置
# 部署路径：/root/edgeeye_cam.conf

# 模式：dual | gc2083 | ov5647
mode=dual

# RTSP 端口
port=8554

# 输出分辨率：1080p | 720p | 480p
res=720p

# 开机自启前等待秒数
boot_delay=8

# 动检录像（需 debris.ko + 板载 ffmpeg；长稳纯推流时可设 0）
record=0
clip_sec=30
cooldown_sec=15

# 浏览器状态页 + JPEG 快照（需 ffmpeg；无则仅显示 RTSP 链接）
web=1
web_port=8080
snapshot_sec=3
