# edgeeye_cam.conf — EdgeEye 摄像头产品配置
# 部署路径：/root/edgeeye_cam.conf
#
# 改完后：
#   ./stop_edgeeye_stack.sh && ./run_edgeeye_stack.sh     # RTSP / Web / 录像
#   ./install_autostart.sh                                # 仅 autostart 变更时

# ── 推流 ─────────────────────────────────────────────
# 模式：dual | gc2083 | ov5647
mode=dual
port=8554
res=720p
boot_delay=8

# ── 可选功能（0=关，1=开）────────────────────────────
# 浏览器页 http://板子IP:8080/
#   web_live=hls      双路 HLS 直播（需 ffmpeg 含 HLS muxer，会占 1~2 路 RTSP）
#   web_live=snapshot JPEG 慢刷（兼容旧行为）
web=0
web_port=8080
web_live=hls
snapshot_sec=3

# 动检录像：双摄 RTSP 仍推 cam0+cam1；动检/clip 默认只走 cam0（勿双路并发 ffmpeg）
record=0
clip_sec=30
cooldown_sec=60
motion_source=rtsp
motion_rtsp=cam0
motion_threshold=15000
motion_interval_sec=5
# clip_dir=/mnt/sd/clips

# 开机自动运行 run_edgeeye_stack.sh（改后须 ./install_autostart.sh）
autostart=0
