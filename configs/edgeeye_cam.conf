# edgeeye_cam.conf — EdgeEye Lite（单摄 GC2083）默认配置
# 部署路径：/root/edgeeye_cam.conf
#
# 产品约定：单摄 GC2083 + 可选动检录像；AI 人检测见 docs/PRODUCT_LITE_AI.md
# 改完后：./stop_edgeeye_stack.sh && ./run_edgeeye_stack.sh

# ── 推流（Lite：仅 GC2083 / cam0）────────────────────
# 模式：gc2083（默认）| ov5647 | dual（开发用，非产品默认）
mode=gc2083
port=8554
res=720p
boot_delay=8

# ── 可选功能（0=关，1=开）────────────────────────────
# 浏览器页默认关，省 RTSP/CPU；需要时再 web=1
web=0
web_port=8080
web_live=hls
snapshot_sec=3

# 动检录像（AI 人检接入前可用 RTSP 差分；默认关）
record=0
clip_sec=30
cooldown_sec=60
motion_source=rtsp
motion_rtsp=cam0
motion_threshold=15000
motion_interval_sec=5
# clip_dir=/mnt/sd/clips

# 开机自动运行（家用可改 1，并 ./install_autostart.sh）
autostart=0

# ── AI 人检测（步骤 2–6）────────────────────────────────
# ai=1 时栈启动后后台 --watch。
# 默认偏保守：拉长轮询、默认不自动录像，避免与 RTSP 预览抢同一路流导致越跑越卡。
# 需要检出录像时再设 ai_record=1（建议同时加大 ai_interval_sec）。
ai=0
ai_classes=person
ai_interval_sec=20
ai_record=0
ai_frame_source=vpss
# ai_log_dir=/mnt/sd/events
# 模型默认：/mnt/cvimodel/mobiledetv2-pedestrian-d0-ls-448.cvimodel
# 一次：./ai_person_detect.sh --once
# 循环：./ai_person_detect.sh --watch --interval 20 --cooldown 60 --frame-source vpss
