; OV5647 dual-camera template for Milk-V Duo S (J1 + J2 CSI ports)
; Requires two OV5647 modules wired to J1 (i2c-3) and J2 (i2c-2).
; Link on board: ln -sf /mnt/data/sensor_cfg_OV5647_dual.ini /mnt/data/sensor_cfg.ini
; RTSP: ./stream/start_rtsp.sh /root/stream/cam_dual.json
[source]
dev_num = 2

[sensor]
name = OV_OV5647_MIPI_2M_30FPS_10BIT
bus_id = 3
sns_i2c_addr = 36
mipi_dev = 0
lane_id = 2, 0, 1, -1, -1
pn_swap = 0, 0, 0, 0, 0

[sensor2]
name = OV_OV5647_MIPI_2M_30FPS_10BIT
bus_id = 2
sns_i2c_addr = 36
mipi_dev = 1
lane_id = 5, 3, 4, -1, -1
pn_swap = 0, 0, 0, 0, 0
