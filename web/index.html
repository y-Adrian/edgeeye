<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EdgeEye 双摄直播</title>
  <style>
    :root { --bg: #0f1419; --card: #1a2332; --text: #e7ecf3; --muted: #8b9cb3; --accent: #3d8bfd; --bad: #e35d6a; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 1rem; }
    h1 { font-size: 1.25rem; margin: 0 0 0.35rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin: 0 0 1rem; }
    .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    .cam { background: var(--card); border-radius: 10px; overflow: hidden; }
    .cam h2 { font-size: 1rem; margin: 0; padding: 0.75rem 1rem; border-bottom: 1px solid #2a3548; display: flex; justify-content: space-between; gap: 0.5rem; }
    .cam .badge { font-size: 0.75rem; color: var(--muted); font-weight: normal; }
    .cam .badge.live { color: #5bd67a; }
    .cam .badge.err { color: var(--bad); }
    .cam video, .cam img { width: 100%; display: block; background: #000; min-height: 200px; aspect-ratio: 16/9; object-fit: contain; }
    .links { padding: 0.75rem 1rem; font-size: 0.85rem; }
    .links a { color: var(--accent); word-break: break-all; }
    .info { background: var(--card); border-radius: 10px; padding: 1rem; margin-top: 1rem; font-size: 0.85rem; }
    code { background: #2a3548; padding: 0.1em 0.35em; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>EdgeEye 双摄</h1>
  <p class="sub" id="status">加载中…</p>
  <p class="sub" id="modeHint">HLS 低延迟分片直播；无画面请用下方 RTSP / ffplay。</p>

  <div class="grid">
    <div class="cam">
      <h2>cam0 — GC2083 <span class="badge" id="b0">…</span></h2>
      <video id="v0" controls playsinline muted autoplay></video>
      <img id="img0" alt="cam0 snapshot" style="display:none">
      <div class="links">RTSP: <a id="rtsp0" href="#">cam0</a></div>
    </div>
    <div class="cam" id="card1">
      <h2>cam1 — OV5647 <span class="badge" id="b1">…</span></h2>
      <video id="v1" controls playsinline muted autoplay></video>
      <img id="img1" alt="cam1 snapshot" style="display:none">
      <div class="links">RTSP: <a id="rtsp1" href="#">cam1</a></div>
    </div>
  </div>

  <div class="info">
    <p><strong>高清直连（Mac / VLC）</strong></p>
    <p><code>ffplay -rtsp_transport tcp rtsp://IP:8554/cam0</code></p>
    <p id="dualHint"><code>ffplay -rtsp_transport tcp rtsp://IP:8554/cam1</code></p>
    <p>conf: <code>web=1</code> + <code>web_live=hls</code>（直播）或 <code>snapshot</code>（JPEG 慢刷）。HLS 期间建议 <code>record=0</code>。</p>
  </div>

  <script src="vendor/hls.min.js"></script>
  <script>
    function setBadge(id, text, cls) {
      var el = document.getElementById(id);
      el.textContent = text;
      el.className = 'badge' + (cls ? ' ' + cls : '');
    }

    function attachHls(video, url, badgeId) {
      if (window.Hls && Hls.isSupported()) {
        var hls = new Hls({
          lowLatencyMode: true,
          liveSyncDurationCount: 2,
          maxLiveSyncPlaybackRate: 1.5
        });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          setBadge(badgeId, 'LIVE', 'live');
          video.play().catch(function () {});
        });
        hls.on(Hls.Events.ERROR, function (_e, data) {
          if (data.fatal) setBadge(badgeId, 'ERROR', 'err');
        });
        return;
      }
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.addEventListener('loadedmetadata', function () {
          setBadge(badgeId, 'LIVE', 'live');
          video.play().catch(function () {});
        });
        return;
      }
      setBadge(badgeId, 'no HLS', 'err');
    }

    function startSnapshot(dual) {
      document.getElementById('modeHint').textContent =
        'JPEG 快照约 3 秒刷新（web_live=snapshot），非实时直播。';
      ['v0', 'v1'].forEach(function (id) {
        document.getElementById(id).style.display = 'none';
      });
      document.getElementById('img0').style.display = 'block';
      if (dual) document.getElementById('img1').style.display = 'block';
      function refresh() {
        var t = Date.now();
        document.getElementById('img0').src = 'snapshots/cam0.jpg?t=' + t;
        if (dual) document.getElementById('img1').src = 'snapshots/cam1.jpg?t=' + t;
        setBadge('b0', 'SNAP');
        if (dual) setBadge('b1', 'SNAP');
      }
      setInterval(refresh, 3000);
      refresh();
    }

    function startHls(dual) {
      document.getElementById('modeHint').textContent =
        'HLS 分片直播（约 4–8 秒延迟）。Safari 原生 HLS；Chrome/Firefox 用 hls.js。';
      attachHls(document.getElementById('v0'), 'hls/cam0.m3u8', 'b0');
      if (dual) attachHls(document.getElementById('v1'), 'hls/cam1.m3u8', 'b1');
    }

    fetch('status.json').then(function (r) { return r.json(); }).then(function (s) {
      var ip = s.ip || location.hostname || '192.168.42.1';
      var port = s.port || 8554;
      var dual = !!s.dual;
      var live = s.web_live || 'hls';
      document.getElementById('status').textContent =
        '模式 ' + s.mode + ' · ' + s.res + ' · ' + live + ' · ' + ip + ':' + port;
      var u0 = 'rtsp://' + ip + ':' + port + '/cam0';
      document.getElementById('rtsp0').href = u0;
      document.getElementById('rtsp0').textContent = u0;
      if (!dual) {
        document.getElementById('card1').style.display = 'none';
        document.getElementById('dualHint').style.display = 'none';
      } else {
        var u1 = 'rtsp://' + ip + ':' + port + '/cam1';
        document.getElementById('rtsp1').href = u1;
        document.getElementById('rtsp1').textContent = u1;
      }
      if (live === 'snapshot') startSnapshot(dual);
      else startHls(dual);
    }).catch(function () {
      document.getElementById('status').textContent = 'status.json 不可用 — 尝试 HLS';
      startHls(true);
    });
  </script>
</body>
</html>
